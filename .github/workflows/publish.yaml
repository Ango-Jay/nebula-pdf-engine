name: Publish to npm

on:
  release:
    types: [published] # Triggers when you create a new GitHub Release

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    
    # CRUCIAL: These permissions are strictly required for generating provenance
    permissions:
      contents: read
      id-token: write 

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-with-registry: 'https://registry.npmjs.org/'
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Compile Package
        run: npm run build

      - name: Publish Package to npm Registry
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}